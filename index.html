<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sauce Sisters</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a0a00;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #game {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
<canvas id="game"></canvas>

<!-- Tone.js (procedural music) — loaded before game scripts -->
<script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
<!-- Howler.js (sample-based SFX playback) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

<!-- Load order matters: each file depends on the ones above it -->
<script src="assets/tiles.js?v=34"></script>  <!-- Tile definitions, shorthand constants -->
<script src="js/engine.js?v=34"></script>     <!-- CONFIG, canvas, input, bindings, camera, game state, core loop -->
<script src="js/sprites.js?v=34"></script>    <!-- Enhanced pixel art sprite generator -->
<script src="js/save.js?v=34"></script>       <!-- Quest flags, items, inventory -->
<script src="js/audio.js?v=34"></script>      <!-- Audio manager, unlock, music + SFX -->
<script src="js/puzzles.js?v=34"></script>    <!-- BMX mini-game, puzzle mechanics -->
<script src="js/entities.js?v=34"></script>   <!-- Player, NPCs, dogs, collision -->
<script src="js/weapons.js?v=34"></script>    <!-- Weapon system, equip, hitboxes, attack -->
<script src="js/world.js?v=34"></script>      <!-- Zones, tile rendering, pushables, world items -->
<script src="js/ui.js?v=34"></script>         <!-- Remap overlay, dialogue, HUD, item flash -->

<!-- Boot -->
<script>
generateAllSprites();       // procedural fallback sprites (instant)
SpriteLoader.load(function() {
    // Image sprites loaded (or failed — procedural fallback active)
    console.log('[Boot] SpriteLoader ready. Loaded: ' + SpriteLoader.loaded + '/' + SpriteLoader.total);
});
loadSettings();             // restore volume + API key from localStorage
loadZone('la_cucina');      // load default zone (title screen will override on Continue)
initTitleScreen();
startGame();
</script>
</body>
</html>
